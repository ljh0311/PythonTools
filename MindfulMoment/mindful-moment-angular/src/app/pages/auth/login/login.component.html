<!-- Login Page Container -->
<div class="login-container">
  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="logo">
        <i class="fas fa-leaf"></i>
      </div>
      <h1 class="app-title">MindfulMoment</h1>
      <p class="login-subtitle">Welcome back! Sign in to continue your mindful
        journey.</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email" class="form-label">
          <i class="fas fa-envelope"></i>
          Email Address
        </label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-input"
          [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          placeholder="Enter your email" />
        <div class="error-message"
          *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          {{ getErrorMessage('email') }}
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">
          <i class="fas fa-lock"></i>
          Password
        </label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-input"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          placeholder="Enter your password" />
        <div class="error-message"
          *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          {{ getErrorMessage('password') }}
        </div>
      </div>

      <!-- Error Message -->
      <div class="error-message general-error" *ngIf="errorMessage">
        <i class="fas fa-exclamation-triangle"></i>
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="login-button"
        [disabled]="isLoading || loginForm.invalid"
        [class.loading]="isLoading">
        <i class="fas fa-sign-in-alt" *ngIf="!isLoading"></i>
        <i class="fas fa-spinner fa-spin" *ngIf="isLoading"></i>
        {{ isLoading ? 'Signing In...' : 'Sign In' }}
      </button>
      <button
        type="button"
        class="login-button"
        (click)="navigateToDeveloperLogin()">
        <i class="fas fa-user-shield"></i>
        Login as developer
      </button>
      <button
        type="button"
        class="login-button"
        (click)="navigateToAdminLogin()">
        <i class="fas fa-user-cog"></i>
        Login as admin
      </button>
      <button
        type="button"
        class="login-button"
        (click)="navigateToUserLogin()">
        <i class="fas fa-user"></i>
        Login as guest
      </button>
    </form>

    <!-- Footer Links -->
    <div class="login-footer">
      <p class="register-link">
        Don't have an account?
        <a (click)="navigateToRegister()" class="link">Create one here</a>
      </p>
    </div>
  </div>

  <!-- Background Elements -->
  <div class="background-elements">
    <div class="floating-element element-1"></div>
    <div class="floating-element element-2"></div>
    <div class="floating-element element-3"></div>
  </div>
</div>
