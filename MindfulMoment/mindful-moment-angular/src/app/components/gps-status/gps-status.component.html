<div class="gps-status" [class.compact]="!showDetails">
  <div class="status-indicator" [style.color]="getStatusColor()">
    <i class="fas" [ngClass]="'fa-' + (getStatusIcon() === 'location_on' ? 'map-marker-alt' : getStatusIcon() === 'location_searching' ? 'search-location' : 'map-marker-times')"></i>
    <span class="status-text">{{ getStatusText() }}</span>
  </div>
  
  <div *ngIf="showDetails && !isLoading" class="status-details">
    <div class="detail-row">
      <span class="detail-label">Accuracy:</span>
      <span class="detail-value">±{{ accuracy }}m</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Updated:</span>
      <span class="detail-value">{{ lastUpdated ? (lastUpdated | date:'shortTime') : '--' }}</span>
    </div>
  </div>

  <div *ngIf="isLoading" class="error-message">
    <i class="fas fa-spinner fa-spin"></i>
    <span>Acquiring GPS signal...</span>
  </div>
</div>
