<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Feedback — Telegram Dashboard</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">✈</span>
        <div>
          <h1>User Feedback</h1>
          <p class="subtitle">Ratings and comments from dashboard users</p>
        </div>
      </div>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="/" class="nav-link">Dashboard</a>
        <a href="/feedback" class="nav-link active" aria-current="page">Feedback</a>
      </nav>
      <div class="topbar-actions">
        <button id="theme-toggle" class="btn btn-ghost" type="button">Toggle theme</button>
        <button id="refresh-btn" class="btn btn-primary" type="button">Refresh</button>
      </div>
    </header>

    <main class="grid feedback-page">
      <section class="card span-2" aria-labelledby="submit-feedback-title">
        <div class="card-header">
          <h2 id="submit-feedback-title">Submit Feedback</h2>
        </div>
        <form id="feedback-form" class="feedback-form">
          <label>
            Rating
            <select id="feedback-rating" required>
              <option value="5">5 - Excellent</option>
              <option value="4">4 - Good</option>
              <option value="3">3 - Average</option>
              <option value="2">2 - Poor</option>
              <option value="1">1 - Bad</option>
            </select>
          </label>
          <label>
            Comment
            <textarea id="feedback-comment" rows="3" placeholder="Share your feedback" required></textarea>
          </label>
          <button class="btn btn-primary" type="submit">Submit feedback</button>
        </form>
      </section>

      <section class="card span-2" aria-labelledby="feedback-list-title">
        <div class="card-header">
          <h2 id="feedback-list-title">All Feedback</h2>
        </div>
        <ul id="feedback-feed" class="feed" aria-live="polite"></ul>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="/static/js/feedback.js"></script>
</body>
</html>
