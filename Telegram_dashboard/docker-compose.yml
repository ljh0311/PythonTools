services:
  telegram-dashboard:
    build: .
    container_name: telegram-dashboard
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - dashboard-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dashboard-data:
